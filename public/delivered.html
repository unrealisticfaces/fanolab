<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivered Log - Fano Laboratory</title>
    <script>const savedTheme = localStorage.getItem('theme') || 'dark'; document.documentElement.setAttribute('data-bs-theme', savedTheme);</script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { overflow-x: hidden; }
        .sidebar { width: 250px; height: 100%; position: fixed; top: 0; left: 0; bottom: 0; background-color: #0f172a !important; border-right: 1px solid rgba(255, 255, 255, 0.1); z-index: 1040; transition: transform 0.3s ease; overflow-y: auto !important; -webkit-overflow-scrolling: touch; }
        .sidebar::-webkit-scrollbar { display: none; }
        .sidebar { -ms-overflow-style: none; scrollbar-width: none; }
        .sidebar.collapsed { transform: translateX(-250px); }
        .main-content { margin-left: 250px; min-height: 100vh; display: flex; flex-direction: column; transition: margin-left 0.3s ease; }
        .main-content.expanded { margin-left: 0; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 5px; padding: 10px 15px; transition: all 0.2s ease; }
        .sidebar .nav-link:hover { background-color: rgba(255, 255, 255, 0.05); color: #ffffff; }
        .sidebar .nav-link.active { background-color: #00d1ff; color: #000 !important; font-weight: bold; box-shadow: 0 4px 12px rgba(0, 209, 255, 0.3); }
        .top-header { background-color: var(--bs-body-bg); border-bottom: 1px solid var(--bs-border-color); height: 60px; position: sticky; top: 0; z-index: 999; }
        #sidebarOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 1030; display: none; opacity: 0; transition: opacity 0.3s ease; }
        #sidebarOverlay.show { display: block; opacity: 1; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-250px); }
            .sidebar.mobile-open { transform: translateX(0); box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
            .main-content { margin-left: 0; }
            .main-content.expanded { margin-left: 0; }
        }
        .table { font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="sidebarOverlay"></div>

    <div class="sidebar d-flex flex-column p-3" id="sidebar" data-bs-theme="dark">
        <a href="dashboard.html" class="text-white text-decoration-none mb-4 mt-2 px-2 d-flex align-items-center">
            <span class="fs-4 fw-bold" style="color: #00d1ff;">Menu</span>
        </a>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item"><a class="nav-link" href="dashboard.html">📊 Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="sales.html">📁 All Sales</a></li>
            <li class="nav-item"><a class="nav-link" href="inprogress.html">⚙️ In Progress</a></li>
            <li class="nav-item"><a class="nav-link" href="duedate.html">⏳ Due Dates</a></li>
            <li class="nav-item"><a class="nav-link active" href="delivered.html">✅ Delivered Log</a></li>
            <li class="nav-item"><a class="nav-link" href="payment.html">💳 Payments</a></li>
            <li class="nav-item"><a class="nav-link" href="audit.html">🔒 Audit Logs</a></li>
        </ul>
        <hr class="text-white-50">
        <div>
            <a href="queue.html" class="nav-link text-warning fw-bold py-2 px-3 mb-2 rounded text-center d-block text-decoration-none" style="background: rgba(255, 193, 7, 0.1); border: 1px solid rgba(255,193,7,0.3);">🖥️ Live Queue</a>
            <button id="logoutBtn" class="btn btn-outline-danger w-100 fw-bold shadow-sm">Logout</button>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-header px-3 px-md-4 d-flex justify-content-between align-items-center shadow-sm">
            <button id="sidebarToggle" class="btn btn-link text-body fs-4 text-decoration-none p-0 me-3" title="Toggle Menu">☰</button>
            <div class="d-flex align-items-center">
                <button id="themeToggleBtn" class="btn btn-sm btn-outline-secondary border-0 fs-5 me-3" title="Toggle Theme">☀️</button>
                <div class="dropdown">
                    <button class="btn btn-warning text-dark fw-bold btn-sm dropdown-toggle position-relative shadow-sm" type="button" id="notificationDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        🔔 Alerts <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notificationCount" style="display: none;">0</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-lg" aria-labelledby="notificationDropdown" id="notificationList" style="min-width: 320px; max-width: 100vw; max-height: 400px; overflow-y: auto; overflow-x: hidden;"></ul>
                </div>
            </div>
        </div>

        <div class="container-fluid mt-4 px-3 px-md-4 pb-5">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 border-bottom border-secondary-subtle pb-3 gap-2">
                <h2 class="fw-bold mb-0 fs-3">Delivered Items Log</h2>
                <div class="bg-success text-white px-3 py-1 rounded shadow-sm">
                    <h5 class="mb-0 fw-bold">Total: <span id="deliveredCount">0</span></h5>
                </div>
            </div>

            <div class="row mb-4 g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-bold small text-uppercase">Select Delivery Date</label>
                    <input type="date" id="customDateFilter" class="form-control shadow-sm border-success bg-body text-body">
                </div>
                <div class="col-md-9">
                    <label class="form-label fw-bold small text-uppercase">Search Records</label>
                    <input type="text" id="searchInput" class="form-control shadow-sm bg-body text-body" placeholder="Search Doctor, RX Number, Messenger, or Description...">
                </div>
            </div>

            <div class="card shadow-sm border-0 bg-body-tertiary">
                <div class="card-body p-0">
                    <div class="table-responsive rounded">
                        <table class="table table-sm table-hover table-bordered align-middle text-nowrap mb-0">
                            <thead class="table-dark" style="--bs-table-bg: #198754;">
                                <tr>
                                    <th>Date Delivered</th><th>Doctor</th><th>RX Number</th>
                                    <th>Description</th><th>Units</th><th>Messenger (Deliver)</th>
                                    <th>Amount Paid (₱)</th>
                                </tr>
                            </thead>
                            <tbody id="deliveredTableBody">
                                <tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-success"></div><p class="mt-2 text-muted fw-bold">Loading delivered history...</p></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/global.js"></script>
    <script type="module" src="js/delivered.js"></script>
</body>
</html>
